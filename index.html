<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Invitation</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 90%; border-top: 8px solid #2c3e50; }
        h1 { color: #2c3e50; margin-bottom: 10px; font-size: 24px; }
        .details { color: #555; line-height: 1.6; margin-bottom: 25px; }
        .btn { display: inline-block; background-color: #34a853; color: white; padding: 12px 25px; text-decoration: none; border-radius: 25px; font-weight: bold; transition: background 0.3s; }
        .btn:hover { background-color: #2d8e47; }
        .icon { font-size: 40px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon">✨</div>
        <h1>You're Invited!</h1>
        <div class="details">
            <p><strong>Time:</strong> August 27, 10:20 AM</p>
            <p><strong>Venue:</strong> Abhimaani CONVENTION HALL<br>Basaveshwara Nagar</p>
        </div>
        
        <!-- Actionable Google Maps Hyperlink -->
        <a href="https://goo.gl" target="_blank" class="btn">
            📍 View Location on Maps
        </a>
    </div>

</body>
</html>
